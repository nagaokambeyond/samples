spring:
  profiles:
    default: jooq
  application:
    name: demo
  datasource:
    url: jdbc:h2:mem:demo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    jpa:
      repositories:
        enabled: false
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  mvc:
      problemdetails:
          enabled: true
mybatis:
  mapper-locations: classpath*:com/example/demo/mybatis/**/*.xml
search:
  page-size: 10
logging:
  level:
    org.seasar.doma.jdbc.LogKind.SQL: DEBUG
    org.jooq.tools.LoggerListener: DEBUG
